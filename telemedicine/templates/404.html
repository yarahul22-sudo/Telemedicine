{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block extra_css %}
    <style>
        .error-container {
            text-align: center;
            padding: 4rem 0;
        }

        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .error-title {
            font-size: 2rem;
            color: #333;
            margin-bottom: 1rem;
        }

        .error-message {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">Sorry, the page you are looking for doesn't exist or has been moved.</p>
        <div class="error-actions">
            <a href="/" class="btn">Go Home</a>
            <a href="/about/" class="btn btn-secondary">Learn More</a>
        </div>
    </div>
{% endblock %}
