{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block extra_css %}
    <style>
        .error-container {
            text-align: center;
            padding: 4rem 0;
        }

        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 1rem;
        }

        .error-title {
            font-size: 2rem;
            color: #333;
            margin-bottom: 1rem;
        }

        .error-message {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="error-container">
        <div class="error-code">500</div>
        <h1 class="error-title">Server Error</h1>
        <p class="error-message">Sorry, something went wrong on our end. Our team has been notified and is working to fix it.</p>
        <div class="error-actions">
            <a href="/" class="btn">Go Home</a>
            <a href="/contact/" class="btn btn-secondary">Contact Support</a>
        </div>
    </div>
{% endblock %}
